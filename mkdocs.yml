site_name: MLIA PyTorch Converter
site_description: Documentation for the MLIA PyTorch converter plugin.
repo_url: https://github.com/arm/mlia-converters-pytorch
repo_name: arm/mlia-converters-pytorch
edit_uri: edit/main/docs/source/
docs_dir: docs/source
site_dir: .mkdocs/site
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.share

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Usage and Integration: usage.md
  - Conversion Flow: conversion_flow.md
  - Conversion Outputs and Diagnostics: conversion_outputs.md
  - Troubleshooting: troubleshooting.md
  - Development: development.md
